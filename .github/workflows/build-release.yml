name: Build Windows EXE Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (required for manual run, e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true
          cache: true
          cache-dependency-path: |
            src/Directory.Packages.props
            src/**/*.csproj

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ inputs.release_tag }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release_tag is required for manual workflow_dispatch runs."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Using release tag: $tag"

      - name: Restore
        working-directory: src
        run: dotnet restore STranslate.slnx

      - name: Publish single-file EXE
        working-directory: src
        run: >-
          dotnet publish STranslate/STranslate.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o ../publish
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:DebugType=None
          /p:DebugSymbols=false

      - name: Ensure output path dist/app.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $source = "publish/STranslate.exe"
          if (-not (Test-Path $source)) {
            throw "Publish output not found: $source"
          }

          Copy-Item $source "dist/app.exe" -Force
          Get-Item "dist/app.exe" | Format-List FullName,Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ steps.tag.outputs.tag }}
          path: dist/app.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/app.exe
          fail_on_unmatched_files: true
          overwrite_files: true
